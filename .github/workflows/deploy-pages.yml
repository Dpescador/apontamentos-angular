name: Publicar aplicação Angular

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --include=dev

      - name: Obter nome do repositório
        id: repository
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "base_href=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_href=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Compilar aplicação
        run: >
          npm run build --
          --configuration production
          --base-href "${{ steps.repository.outputs.base_href }}"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar arquivos para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apontamentos-dashboard/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4