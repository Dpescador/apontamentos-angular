<header class="app-header mb-3 mb-md-4">
  <div class="d-flex flex-column flex-lg-row align-items-lg-start justify-content-between gap-3 gap-xl-4">
    <div class="header-title d-flex align-items-start gap-2 gap-sm-3">
      <span class="icon-circle bg-primary-subtle text-primary fs-4 mt-1" aria-hidden="true">
        <i class="bi bi-clock-history"></i>
      </span>
      <div class="min-w-0">
        <p class="text-primary fw-bold text-uppercase small letter-spacing mb-1">Controle de horas</p>
        <h1 class="app-title fw-bold mb-1 mb-sm-2">Apontamentos de atividades</h1>
        <p class="text-secondary mb-0 app-subtitle">Acompanhe a carga diária, o acumulado semanal e o desempenho do mês.</p>
      </div>
    </div>

    <div class="header-actions row g-2 justify-content-lg-end" aria-label="Ações do arquivo TXT">
      <div class="col-6 col-sm-auto">
        <button class="btn btn-primary w-100 d-inline-flex align-items-center justify-content-center gap-2" type="button" (click)="connectTxt.emit()">
          <i class="bi bi-link-45deg" aria-hidden="true"></i>
          <span>Vincular TXT</span>
        </button>
      </div>
      <div class="col-6 col-sm-auto">
        <button class="btn btn-outline-secondary w-100 d-inline-flex align-items-center justify-content-center gap-2" type="button" (click)="syncTxt.emit()">
          <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
          <span>Sincronizar</span>
        </button>
      </div>
      <div class="col-6 col-sm-auto">
        <label class="btn btn-outline-secondary w-100 mb-0 d-inline-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-upload" aria-hidden="true"></i>
          <span>Importar TXT</span>
          <input class="visually-hidden" type="file" accept=".txt,text/plain,application/json" (change)="onFileSelected($event)" />
        </label>
      </div>
      <div class="col-6 col-sm-auto">
        <button class="btn btn-outline-secondary w-100 d-inline-flex align-items-center justify-content-center gap-2" type="button" (click)="exportTxt.emit()">
          <i class="bi bi-download" aria-hidden="true"></i>
          <span>Exportar TXT</span>
        </button>
      </div>
    </div>
  </div>

  <div class="alert py-2 px-2 px-sm-3 mt-3 mb-0 d-flex align-items-start align-items-sm-center gap-2" [class.alert-success]="linked" [class.alert-warning]="!linked">
    <i class="bi mt-1 mt-sm-0" [class.bi-file-earmark-check-fill]="linked" [class.bi-file-earmark-excel-fill]="!linked" aria-hidden="true"></i>
    <span class="small text-break">{{ fileStatus }}</span>
  </div>
</header>
