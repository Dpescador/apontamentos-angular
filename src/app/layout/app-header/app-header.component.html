<header class="mb-4">
  <div class="d-flex flex-column flex-xl-row align-items-xl-start justify-content-between gap-3">
    <div class="d-flex align-items-start gap-3">
      <span class="icon-circle bg-primary-subtle text-primary fs-4 mt-1" aria-hidden="true">
        <i class="bi bi-clock-history"></i>
      </span>
      <div>
        <p class="text-primary fw-bold text-uppercase small letter-spacing mb-1">Controle de horas</p>
        <h1 class="display-6 fw-bold mb-2">Apontamentos de atividades</h1>
        <p class="text-secondary mb-0">Acompanhe a carga diária, o acumulado semanal e o desempenho do mês.</p>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2 justify-content-xl-end" aria-label="Ações do arquivo TXT">
      <button class="btn btn-primary d-inline-flex align-items-center gap-2" type="button" (click)="connectTxt.emit()">
        <i class="bi bi-link-45deg" aria-hidden="true"></i>
        Vincular TXT
      </button>
      <button class="btn btn-outline-secondary d-inline-flex align-items-center gap-2" type="button" (click)="syncTxt.emit()">
        <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
        Sincronizar
      </button>
      <label class="btn btn-outline-secondary mb-0 d-inline-flex align-items-center gap-2">
        <i class="bi bi-upload" aria-hidden="true"></i>
        Importar TXT
        <input class="visually-hidden" type="file" accept=".txt,text/plain,application/json" (change)="onFileSelected($event)" />
      </label>
      <button class="btn btn-outline-secondary d-inline-flex align-items-center gap-2" type="button" (click)="exportTxt.emit()">
        <i class="bi bi-download" aria-hidden="true"></i>
        Exportar TXT
      </button>
    </div>
  </div>

  <div class="alert py-2 px-3 mt-3 mb-0 d-flex align-items-center gap-2" [class.alert-success]="linked" [class.alert-warning]="!linked">
    <i class="bi" [class.bi-file-earmark-check-fill]="linked" [class.bi-file-earmark-excel-fill]="!linked" aria-hidden="true"></i>
    <span class="small">{{ fileStatus }}</span>
  </div>
</header>
