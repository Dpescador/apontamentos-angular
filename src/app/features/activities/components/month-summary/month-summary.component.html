<article class="card h-100 border-0 shadow-sm">
  <div class="card-body d-flex flex-column p-3 p-lg-4">
    <div class="d-flex align-items-center justify-content-between gap-3 mb-2">
      <div class="d-flex align-items-center gap-2">
        <span class="icon-circle bg-primary-subtle text-primary" aria-hidden="true">
          <i class="bi bi-calendar3"></i>
        </span>
        <div>
          <span class="text-primary fw-bold text-uppercase small letter-spacing d-block">Mês</span>
          <h2 class="h5 text-capitalize mb-0">{{ monthLabel }}</h2>
        </div>
      </div>
      <div class="btn-group" role="group" aria-label="Navegação mensal">
        <button class="btn btn-outline-secondary" type="button" aria-label="Mês anterior" title="Mês anterior" (click)="previousMonth.emit()">
          <i class="bi bi-chevron-left" aria-hidden="true"></i>
        </button>
        <button class="btn btn-outline-secondary" type="button" aria-label="Próximo mês" title="Próximo mês" (click)="nextMonth.emit()">
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="mt-3">
      <strong class="display-6 fw-bold d-block">{{ formatHours(monthTotal) }}h</strong>
      <span class="text-secondary small">de {{ formatHours(monthExpected) }}h úteis previstas até a data selecionada</span>
    </div>

    <div class="progress mt-3" role="progressbar" aria-label="Progresso mensal" [attr.aria-valuenow]="monthProgress" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar" [style.width.%]="monthProgress"></div>
    </div>
    <p class="text-secondary small mt-2 mb-0"><i class="bi bi-info-circle me-1" aria-hidden="true"></i>O gráfico mensal consolida os lançamentos do mesmo dia.</p>
  </div>
</article>
