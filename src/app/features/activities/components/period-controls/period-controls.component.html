<section class="card shadow-sm border-0 mb-3">
  <div class="card-body d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
    <div class="d-flex align-items-center gap-2">
      <span class="icon-circle bg-primary-subtle text-primary" aria-hidden="true">
        <i class="bi bi-calendar-week"></i>
      </span>
      <div>
        <span class="text-primary fw-bold text-uppercase small letter-spacing d-block">Período analisado</span>
        <strong class="text-capitalize">{{ weekLabel }}</strong>
      </div>
    </div>

    <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2">
      <button
        class="btn d-inline-flex align-items-center justify-content-center gap-2"
        [class.btn-primary]="showWeekends"
        [class.btn-outline-primary]="!showWeekends"
        type="button"
        [attr.aria-pressed]="showWeekends"
        (click)="toggleWeekends.emit()"
      >
        <i class="bi" [class.bi-calendar2-week-fill]="showWeekends" [class.bi-calendar2-week]="!showWeekends" aria-hidden="true"></i>
        {{ showWeekends ? 'Ocultar finais de semana' : 'Exibir finais de semana' }}
      </button>

      <div class="input-group period-date-group">
        <button class="btn btn-outline-secondary" type="button" aria-label="Semana anterior" title="Semana anterior" (click)="previousWeek.emit()">
          <i class="bi bi-chevron-left" aria-hidden="true"></i>
        </button>
        <input class="form-control" type="date" [value]="referenceDate" (change)="onReferenceDateChange($event)" />
        <button class="btn btn-outline-secondary" type="button" aria-label="Próxima semana" title="Próxima semana" (click)="nextWeek.emit()">
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>
</section>
