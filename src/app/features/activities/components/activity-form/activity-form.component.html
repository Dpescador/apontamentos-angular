<section id="activity-form" class="card border-0 shadow-sm scroll-margin">
  <div class="card-body p-3 p-lg-4">
    <div class="form-header d-flex flex-column flex-sm-row align-items-sm-start justify-content-between gap-2 gap-sm-3 mb-3">
      <div class="d-flex align-items-center gap-2 min-w-0">
        <span class="icon-circle bg-primary-subtle text-primary" aria-hidden="true">
          <i class="bi" [class.bi-pencil-square]="editing" [class.bi-plus-circle]="!editing"></i>
        </span>
        <div class="min-w-0">
          <span class="text-primary fw-bold text-uppercase small letter-spacing d-block">Lançamento</span>
          <h2 class="h5 mb-0 text-truncate">{{ editing ? 'Editar apontamento' : 'Nova atividade' }}</h2>
        </div>
      </div>
      @if (editing) {
        <button class="btn btn-link text-decoration-none p-0 d-inline-flex align-items-center gap-1 align-self-start" type="button" (click)="cancel.emit()">
          <i class="bi bi-x-circle" aria-hidden="true"></i>
          Cancelar edição
        </button>
      }
    </div>

    <form [formGroup]="form" (ngSubmit)="save.emit()" autocomplete="off">
      <div class="row g-2 g-sm-3">
        <div class="col-12 col-sm-6 col-md-4 col-xl-2">
          <label class="form-label fw-semibold small" for="activity-date"><i class="bi bi-calendar3 me-1" aria-hidden="true"></i>Data *</label>
          <input
            id="activity-date"
            class="form-control"
            type="date"
            formControlName="date"
            [class.is-invalid]="form.get('date')?.invalid && form.get('date')?.touched"
          />
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-xl-2">
          <label class="form-label fw-semibold small" for="activity-sprint"><i class="bi bi-lightning-charge me-1" aria-hidden="true"></i>Sprint</label>
          <input
            id="activity-sprint"
            class="form-control"
            type="text"
            formControlName="sprint"
            placeholder="Ex.: Sprint 18"
          />
        </div>

        <div class="col-12 col-md-6 col-lg-5 col-xl-3">
          <label class="form-label fw-semibold small" for="activity-task-id"><i class="bi bi-hash me-1" aria-hidden="true"></i>ID da tarefa *</label>
          <input
            id="activity-task-id"
            class="form-control"
            type="text"
            formControlName="taskId"
            placeholder="Ex.: TASK 1412342"
            [class.is-invalid]="form.get('taskId')?.invalid && form.get('taskId')?.touched"
          />
        </div>

        <div class="col-12 col-md-6 col-lg-5 col-xl-3">
          <label class="form-label fw-semibold small" for="activity-task"><i class="bi bi-list-task me-1" aria-hidden="true"></i>Tarefa *</label>
          <select
            id="activity-task"
            class="form-select"
            formControlName="task"
            [class.is-invalid]="form.get('task')?.invalid && form.get('task')?.touched"
          >
            <option value="">Selecione uma tarefa</option>

            @if (currentTask && !isKnownTask(currentTask)) {
              <option [value]="currentTask">{{ currentTask }} (registro existente)</option>
            }

            @for (option of taskOptions; track option) {
              <option [value]="option">{{ option }}</option>
            }
          </select>
          <div class="invalid-feedback">Selecione uma tarefa.</div>
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg-2 col-xl-2">
          <label class="form-label fw-semibold small" for="activity-hours"><i class="bi bi-clock me-1" aria-hidden="true"></i>Horas *</label>
          <input
            id="activity-hours"
            class="form-control"
            type="number"
            formControlName="hours"
            min="0.1"
            max="24"
            step="0.25"
            [class.is-invalid]="form.get('hours')?.invalid && form.get('hours')?.touched"
          />
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold small" for="activity-items"><i class="bi bi-card-checklist me-1" aria-hidden="true"></i>Itens trabalhados</label>
          <input
            id="activity-items"
            class="form-control"
            type="text"
            formControlName="itemsWorked"
            autocomplete="off"
            placeholder="Ex.: Daily, ajustes, desenvolvimento..."
          />
        </div>
      </div>

      <div class="d-flex justify-content-stretch justify-content-sm-end mt-3 mt-sm-4">
        <button class="form-submit btn btn-primary px-sm-4 d-inline-flex align-items-center justify-content-center gap-2" type="submit">
          <i class="bi" [class.bi-floppy]="editing" [class.bi-plus-lg]="!editing" aria-hidden="true"></i>
          {{ editing ? 'Salvar alterações' : 'Adicionar apontamento' }}
        </button>
      </div>
    </form>
  </div>
</section>
